# ============================================================
# IRONKERNEL — iso_root/boot/grub/grub.cfg
# GRUB2 boot menu configuration
# ============================================================

set timeout=5
# TIMEOUT — GRUB displays the menu and waits 5 seconds.
# After 5 seconds it automatically boots the default entry.
# Set to -1 to wait forever. Set to 0 to skip the menu entirely.

set default=0
# DEFAULT — index of the menu entry to boot automatically.
# 0 = first entry in this file. We only have one entry.

insmod all_video

menuentry "IRONKERNEL // SAFE TEXT BOOT" {
    terminal_output console

    multiboot2 /boot/myos.bin
    # MULTIBOOT2 — GRUB command that loads a Multiboot2-compliant binary.
    # The path /boot/myos.bin is INSIDE the ISO filesystem, not your host.
    # grub-mkrescue copies iso_root/ into the ISO as its root.
    # So iso_root/boot/myos.bin becomes /boot/myos.bin inside the ISO.
    # GRUB reads this path relative to its own mounted filesystem.
    # Giving a host path like /home/marco/ironkernel/myos.bin would fail —
    # GRUB has no knowledge of your Arch Linux filesystem at boot time.

    boot
    # BOOT — tells GRUB to transfer control to the loaded kernel.
    # Without this, GRUB loads the binary into memory but never jumps.
}

menuentry "IRONKERNEL // GRAPHICS BOOT (experimental)" {
    set gfxmode=640x480
    set gfxpayload=keep
    terminal_output gfxterm
    multiboot2 /boot/myos.bin
    boot
}
